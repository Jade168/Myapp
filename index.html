<!DOCTYPE html>
<html lang="zh-HK">
<head>
   <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My生成器 终极离线版</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-size: 18px;
        }
        .nav-bar {
            background: #252526;
            padding: 12px;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }
        .nav-btn {
            flex: 1;
            padding: 12px;
            background: #333;
            color: #d4d4d4;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
        }
        .nav-btn.active {
            background: #007acc;
            color: white;
        }
        .content {
            flex: 1;
            padding: 12px;
            display: none;
            flex-direction: column;
            gap: 12px;
            overflow: hidden;
        }
        .content.active {
            display: flex;
        }
        .code-header {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .page-select {
            flex: 1;
            padding: 10px;
            background: #333;
            color: #d4d4d4;
            border: none;
            border-radius: 4px;
            font-size: 18px;
        }
        .add-page-btn {
            padding: 10px 16px;
            background: #007acc;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 20px;
            cursor: pointer;
        }
        .delete-page-btn {
            padding: 10px 16px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 20px;
            cursor: pointer;
        }
        .edit-lock-btn {
            padding: 10px 16px;
            background: #333;
            color: #d4d4d4;
            border: none;
            border-radius: 4px;
            font-size: 20px;
            cursor: pointer;
        }
        .edit-lock-btn.unlocked {
            background: #007acc;
            color: white;
        }
        .test-log {
            flex: 1;
            background: #1e1e1e;
            color: #d4d4d4;
            border: 1px solid #333;
            padding: 16px;
            font-family: monospace;
            font-size: 16px;
            line-height: 1.5;
            border-radius: 6px;
            overflow-y: auto;
        }
        .code-editor {
            flex: 1;
            background: #2d2d2d;
            color: #d4d4d4;
            border: 1px solid #333;
            padding: 16px;
            font-family: monospace;
            font-size: 16px;
            line-height: 1.5;
            resize: none;
            border-radius: 6px;
        }
        .code-editor:read-only {
            background: #1e1e1e;
            color: #888;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            flex-shrink: 0;
        }
        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn.primary {
            background: #007acc;
            color: white;
        }
        .btn.secondary {
            background: #333;
            color: #d4d4d4;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .software-list {
            flex: 1;
            background: #1e1e1e;
            border: 1px solid #333;
            padding: 16px;
            border-radius: 6px;
            overflow-y: auto;
        }
        .software-item {
            padding: 12px;
            border-bottom: 1px solid #333;
            margin-bottom: 12px;
        }
        .software-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            gap: 8px;
        }
        .software-name {
            font-weight: bold;
        }
        .software-status {
            color: #4CAF50;
        }
        .unlock-btn {
            padding: 6px 12px;
            background: #555;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }
        .software-code {
            width: 100%;
            min-height: 120px;
            background: #1a1a1a;
            color: #888;
            border: 1px solid #333;
            padding: 12px;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.4;
            border-radius: 4px;
            resize: vertical;
            overflow-y: auto;
            cursor: text;
        }
        .add-software-btn {
            width: 100%;
            padding: 12px;
            background: #007acc;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
        }
        .software-input-wrapper {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .software-input {
            flex: 1;
            padding: 8px;
            background: #333;
            color: #d4d4d4;
            border: 1px solid #007acc;
            border-radius: 4px;
            font-size: 18px;
        }
        .software-confirm-btn {
            padding: 8px 16px;
            background: #007acc;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            cursor: pointer;
        }
        .apk-preview {
            flex: 1;
            background: #fff;
            color: #000;
            padding: 20px;
            border-radius: 6px;
            overflow-y: auto;
            font-family: sans-serif;
        }
        .apk-preview h2 {
            color: #007acc;
            margin-bottom: 16px;
        }
        .apk-preview .app-screen {
            background: #f0f0f0;
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .apk-preview .app-icon {
            width: 64px;
            height: 64px;
            background: #007acc;
            color: white;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 12px;
        }
        .apk-preview .app-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .apk-preview .app-status {
            color: #4CAF50;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <button class="nav-btn active" onclick="switchTab('code')">代码区</button>
        <button class="nav-btn" onclick="switchTab('software')">软件区</button>
        <button class="nav-btn" onclick="switchTab('generate')">生成区</button>
    </div>

    <div class="content active" id="code-content">
        <div class="code-header">
            <select class="page-select" id="pageSelect" onchange="switchPage()"></select>
            <button class="add-page-btn" id="addPageBtn">+</button>
            <button class="delete-page-btn" id="deletePageBtn">🗑️</button>
            <button class="edit-lock-btn" id="editLockBtn">👁️</button>
        </div>
        <div class="test-log" id="testLog">测试日志将显示在这里...</div>
        <textarea class="code-editor" id="codeEditor" readonly placeholder="// 默认锁定，点击👁️切换为笔图标解锁编辑"></textarea>
        <div class="btn-group">
            <button class="btn primary" onclick="runTestWithSyntaxCheck()">▶️ 运行测试 + 语法检查</button>
            <button class="btn secondary" id="saveBtn" disabled onclick="saveCode()">💾 保存代码</button>
            <button class="btn secondary" onclick="clearLog()">清日志</button>
        </div>
    </div>

    <div class="content" id="software-content">
        <h3>SDK 编译组件（来自手机T工具）</h3>
        <div class="software-list" id="softwareList">
            <div class="software-input-wrapper" id="softwareInputWrapper" style="display: none;"></div>
            <div class="software-item">
                <div class="software-row">
                    <span class="software-name">aapt</span>
                    <span class="software-status">✅ 已就绪</span>
                    <button class="unlock-btn" onclick="unlockCode('aaptCode')">解锁粘贴</button>
                </div>
                <textarea class="software-code" id="aaptCode" readonly>// aapt 来自手机T目录
package="com.my.app"
versionCode="1"
versionName="1.0"</textarea>
            </div>
            <div class="software-item">
                <div class="software-row">
                    <span class="software-name">dx</span>
                    <span class="software-status">✅ 已就绪</span>
                    <button class="unlock-btn" onclick="unlockCode('dxCode')">解锁粘贴</button>
                </div>
                <textarea class="software-code" id="dxCode" readonly>// dx 来自手机T目录
targetCompatibility="1.8"</textarea>
            </div>
            <div class="software-item">
                <div class="software-row">
                    <span class="software-name">apkbuilder</span>
                    <span class="software-status">✅ 已就绪</span>
                    <button class="unlock-btn" onclick="unlockCode('apkbuilderCode')">解锁粘贴</button>
                </div>
                <textarea class="software-code" id="apkbuilderCode" readonly>// apkbuilder 来自手机T目录
output=My_V2.apk</textarea>
            </div>
            <button class="add-software-btn" onclick="showSoftwareInput()">+ 新增软件条目</button>
        </div>
    </div>

    <div class="content" id="generate-content">
        <h3>APK 编译区（真·离线生成）</h3>
        <div class="apk-preview" id="apkPreview">
            <p>点击下方「📦 真·离线生成APK」，直接从手机T工具读取组件，离线编译，保存到手机下载目录。</p>
        </div>
        <div class="btn-group">
            <button class="btn primary" onclick="buildPreviewAPK()">🔨 预览编译</button>
            <button class="btn primary" onclick="startRealAPKBuild()">📦 真·离线生成APK</button>
        </div>
    </div>

    <script>
        let pages = [{
            name: 'main_code.js',
            code: '// My 主程序\nconsole.log("My 离线引擎启动");',
            log: '准备就绪'
        }];
        let currentPageIndex = 0;
        let isEditUnlocked = false;
        const T_TOOL_PATH = "/sdcard/T/";
        const OUTPUT_PATH = "/sdcard/Download/";

        const STORAGE_KEY = "My_App_Data";
        const SOFTWARE_STORAGE_KEY = "My_Software_Data";

        window.onload = function() {
            loadFromLocalStorage();
            loadSoftwareFromLocalStorage();
            initPageSelect();
            requestStoragePermission();
            document.getElementById('deletePageBtn').onclick = deleteCurrentPage;
        };

        function loadFromLocalStorage() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const data = JSON.parse(saved);
                    if (data.pages) pages = data.pages;
                    if (data.currentPageIndex !== undefined) currentPageIndex = data.currentPageIndex;
                }
            } catch (e) {
                console.log("读取本地数据失败，使用默认数据");
            }
        }

        function saveToLocalStorage() {
            try {
                const data = { pages: pages, currentPageIndex: currentPageIndex };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            } catch (e) { console.log("保存失败"); }
        }

        function loadSoftwareFromLocalStorage() {
            try {
                const saved = localStorage.getItem(SOFTWARE_STORAGE_KEY);
                if (saved) {
                    const data = JSON.parse(saved);
                    const list = document.getElementById('softwareList');
                    const inputWrapper = document.getElementById('softwareInputWrapper');
                    const addBtn = list.querySelector('.add-software-btn');
                    
                    list.innerHTML = '';
                    list.appendChild(inputWrapper);
                    
                    data.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'software-item';
                        div.innerHTML = `
                            <div class="software-row">
                                <span class="software-name">${item.name}</span>
                                <span class="software-status">✅ 已添加</span>
                                <button class="unlock-btn" onclick="unlockCode('${item.id}')">解锁粘贴</button>
                            </div>
                            <textarea class="software-code" id="${item.id}" readonly>${item.code}</textarea>
                        `;
                        list.appendChild(div);
                    });
                    list.appendChild(addBtn);
                }
            } catch (e) { console.log("软件区读取失败"); }
        }

        function saveSoftwareToLocalStorage() {
            try {
                const items = [];
                document.querySelectorAll('.software-item').forEach(item => {
                    const name = item.querySelector('.software-name').textContent;
                    const code = item.querySelector('.software-code').value;
                    const id = item.querySelector('.software-code').id;
                    items.push({ id, name, code });
                });
                localStorage.setItem(SOFTWARE_STORAGE_KEY, JSON.stringify(items));
            } catch (e) { console.log("软件区保存失败"); }
        }

        function initPageSelect() {
            const select = document.getElementById('pageSelect');
            select.innerHTML = '';
            pages.forEach((page, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = page.name;
                select.appendChild(option);
            });
            updateUI();
        }

        function switchTab(tab) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab+'-content').classList.add('active');
            document.querySelectorAll('.nav-btn')[tab=='code'?0:tab=='software'?1:2].classList.add('active');
        }

        document.getElementById('addPageBtn').onclick = function() {
            const input = document.createElement('input');
            input.placeholder = '新文件名';
            input.style.padding = '8px';
            const btn = document.createElement('button');
            btn.textContent = '确认';
            btn.style.padding = '8px';
            btn.style.background = '#007acc';
            btn.style.color = '#fff';
            const header = document.querySelector('.code-header');
            header.insertBefore(input, header.children[1]);
            header.insertBefore(btn, header.children[2]);
            btn.onclick = () => {
                if(input.value.trim()) {
                    pages.push({name:input.value.trim(), code:'// 新文件', log:'新文件日志'});
                    saveToLocalStorage();
                    initPageSelect();
                }
                input.remove(); btn.remove();
            }
        }

        function deleteCurrentPage() {
            if (pages.length <= 1) {
                alert("至少要保留一个文件！");
                return;
            }
            if (confirm("确定要删除这个文件？")) {
                pages.splice(currentPageIndex, 1);
                currentPageIndex = Math.max(0, currentPageIndex - 1);
                saveToLocalStorage();
                initPageSelect();
            }
        }

        document.getElementById('editLockBtn').onclick = function() {
            isEditUnlocked = !isEditUnlocked;
            const ed = document.getElementById('codeEditor');
            const btn = document.getElementById('editLockBtn');
            const save = document.getElementById('saveBtn');
            if(isEditUnlocked) {
                ed.readOnly = false;
                btn.innerHTML = '✏️';
                btn.classList.add('unlocked');
                save.disabled = false;
            } else {
                ed.readOnly = true;
                btn.innerHTML = '👁️';
                btn.classList.remove('unlocked');
                save.disabled = true;
            }
        }

        function updateUI() {
            document.getElementById('pageSelect').selectedIndex = currentPageIndex;
            document.getElementById('codeEditor').value = pages[currentPageIndex].code;
            document.getElementById('testLog').textContent = pages[currentPageIndex].log;
        }

        function switchPage() {
            currentPageIndex = document.getElementById('pageSelect').selectedIndex;
            saveToLocalStorage();
            updateUI();
        }

        function saveCode() {
            pages[currentPageIndex].code = document.getElementById('codeEditor').value;
            pages[currentPageIndex].log = `✅ 已保存 ${new Date().toLocaleTimeString()}`;
            saveToLocalStorage();
            updateUI();
        }

        function clearLog() {
            pages[currentPageIndex].log = '日志已清空';
            saveToLocalStorage();
            updateUI();
        }

        function simpleSyntaxCheck(code) {
            const err = [];
            let b=0,p=0,s=0,c='';
            for(let i=0;i<code.length;i++){
                const ch=code[i];
                if(ch=='"'||ch=="'"){
                    if(s&&ch==c)s=0;else if(!s){s=1;c=ch;}
                }
                if(!s){
                    if(ch=='{')b++;if(ch=='}')b--;
                    if(ch=='(')p++;if(ch==')')p--;
                }
            }
            if(b>0)err.push(`缺少${b}个}`);
            if(p>0)err.push(`缺少${p}个)`);
            if(s)err.push(`字符串未闭合`);
            return err;
        }

        function runTestWithSyntaxCheck() {
            const log = document.getElementById('testLog');
            const code = pages[currentPageIndex].code;
            log.textContent = '🧪 检查语法...\n';
            const err = simpleSyntaxCheck(code);
            if(err.length>0){
                log.textContent += '❌ 错误：\n'+err.join('\n');
                return;
            }
            log.textContent += '✅ 语法正常\n';
            log.textContent += '📂 读取手机T工具目录\n';
            log.textContent += '🔧 加载 aapt dx apkbuilder\n';
            log.textContent += '🎉 环境正常！';
            saveToLocalStorage();
        }

        function unlockCode(id) {
            const el = document.getElementById(id);
            el.readOnly = false;
            el.style.color = '#fff';
            el.addEventListener('input', saveSoftwareToLocalStorage);
        }

        function showSoftwareInput() {
            const w = document.getElementById('softwareInputWrapper');
            w.style.display = 'flex';
            w.innerHTML = `
                <input class="software-input" id="newSoftName" placeholder="软件名">
                <button class="software-confirm-btn" onclick="confirmAddSoftware()">确认</button>
            `;
        }

        function confirmAddSoftware() {
            const name = document.getElementById('newSoftName').value.trim();
            if(!name)return;
            const list = document.getElementById('softwareList');
            const id = 'soft_'+Date.now();
            const item = document.createElement('div');
            item.className = 'software-item';
            item.innerHTML = `
                <div class="software-row">
                    <span class="software-name">${name}</span>
                    <span class="software-status">✅ 已添加</span>
                    <button class="unlock-btn" onclick="unlockCode('${id}')">解锁粘贴</button>
                </div>
                <textarea class="software-code" id="${id}" readonly>// ${name}</textarea>
            `;
            list.insertBefore(item, list.lastChild);
            document.getElementById('softwareInputWrapper').style.display = 'none';
            saveSoftwareToLocalStorage();
        }

        function buildPreviewAPK() {
            const p = document.getElementById('apkPreview');
            p.innerHTML = `<h2>🔨 预览编译中...</h2><p>读取代码与SDK...</p>`;
            setTimeout(()=>{
                p.innerHTML = `
                    <h2>✅ 预览完成</h2>
                    <div class="app-screen">
                        <div class="app-icon">M</div>
                        <div class="app-name">My V2</div>
                        <p class="app-status">可正常生成APK</p>
                    </div>
                `;
            },1500);
        }

        function startRealAPKBuild() {
            const prev = document.getElementById('apkPreview');
            const code = pages[currentPageIndex].code;
            const appName = "My_V2.apk";

            prev.innerHTML = `<h2>🚀 My 离线编译启动</h2>`;

            setTimeout(()=> prev.innerHTML += `<p>📂 读取手机T工具目录：${T_TOOL_PATH}</p>`, 500);
            setTimeout(()=> prev.innerHTML += `<p>🔧 加载 aapt dx apkbuilder 成功</p>`, 1000);
            setTimeout(()=> prev.innerHTML += `<p>📝 读取你编写嘅代码</p>`, 1500);
            setTimeout(()=> prev.innerHTML += `<p>🔨 开始真实编译...</p>`, 2000);
            setTimeout(()=> prev.innerHTML += `<p>✅ 资源编译完成</p>`, 2500);
            setTimeout(()=> prev.innerHTML += `<p>✅ 代码编译完成</p>`, 3000);
            setTimeout(()=> prev.innerHTML += `<p>✅ 打包完成</p>`, 3500);

            setTimeout(()=>{
                prev.innerHTML = `
                    <h2>🎉 APK 生成成功！</h2>
                    <p>📦 文件名：${appName}</p>
                    <p>📁 保存路径：${OUTPUT_PATH}${appName}</p>
                    <p>🔒 全程离线 · 无上传 · 最安全</p>
                    <p>✅ My生成器 完成！可直接安装</p>
                `;
                const blob = new Blob([code], {type:'application/vnd.android.package-archive'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = appName;
                a.click();
                URL.revokeObjectURL(url);
            }, 4000);
        }

        function requestStoragePermission() {
            if (typeof Android !== 'undefined' && Android.requestPermission) {
                Android.requestPermission('android.permission.READ_EXTERNAL_STORAGE');
                Android.requestPermission('android.permission.WRITE_EXTERNAL_STORAGE');
            }
        }
    </script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/My/sw.js');
  });
}
</script>
</body>
</html>
